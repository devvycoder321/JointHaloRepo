openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: chat
  - name: github
  - name: ai
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials

  /auth/setup-totp:
    post:
      operationId: setupTotp
      tags: [auth]
      summary: Generate TOTP secret and QR code
      responses:
        "200":
          description: TOTP setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetup"

  /auth/verify-totp:
    post:
      operationId: verifyTotp
      tags: [auth]
      summary: Verify TOTP token and complete login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpVerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid token

  /auth/status:
    get:
      operationId: authStatus
      tags: [auth]
      summary: Check if authenticated
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResult"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/request-access:
    post:
      operationId: requestAccess
      tags: [auth]
      summary: Request access to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRequestInput"
      responses:
        "200":
          description: Request submitted

  /auth/access-requests:
    get:
      operationId: getAccessRequests
      tags: [auth]
      summary: Get all access requests (admin only)
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessRequestItem"

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get chat history
      parameters:
        - name: sessionId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message to AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/sessions:
    get:
      operationId: getChatSessions
      tags: [chat]
      summary: Get all chat sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"

  /chat/sessions/{id}:
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /github/repos:
    get:
      operationId: getGithubRepos
      tags: [github]
      summary: List GitHub repositories
      responses:
        "200":
          description: List of repos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GithubRepo"

  /github/config:
    get:
      operationId: getGithubConfig
      tags: [github]
      summary: Get GitHub config
      responses:
        "200":
          description: GitHub config status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubConfig"
    post:
      operationId: saveGithubConfig
      tags: [github]
      summary: Save GitHub token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubConfigInput"
      responses:
        "200":
          description: Saved

  /ai/generate-image:
    post:
      operationId: generateImage
      tags: [ai]
      summary: Generate an image from a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerateInput"
      responses:
        "200":
          description: Generated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerateResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResult:
      type: object
      properties:
        step:
          type: string
          enum: [totp_setup, totp_verify]
        message:
          type: string
      required: [step]

    TotpSetup:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        otpauthUrl:
          type: string
      required: [secret, qrCodeUrl, otpauthUrl]

    TotpVerifyInput:
      type: object
      properties:
        token:
          type: string
      required: [token]

    AuthSession:
      type: object
      properties:
        authenticated:
          type: boolean
        message:
          type: string
      required: [authenticated]

    AuthStatusResult:
      type: object
      properties:
        authenticated:
          type: boolean
        email:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
      required: [authenticated]

    AccessRequestInput:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        reason:
          type: ["string", "null"]
      required: [email, name]

    AccessRequestItem:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        reason:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
      required: [id, email, name, status, createdAt]

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
      required: [id, sessionId, role, content, createdAt]

    ChatMessageInput:
      type: object
      properties:
        sessionId:
          type: integer
        content:
          type: string
        systemPrompt:
          type: ["string", "null"]
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachment"
      required: [sessionId, content]

    ChatAttachment:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        data:
          type: string
        size:
          type: integer
      required: [name, type, data]

    ChatSession:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        messageCount:
          type: integer
      required: [id, title, createdAt, messageCount]

    ChatSessionInput:
      type: object
      properties:
        title:
          type: string
      required: [title]

    GithubRepo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        fullName:
          type: string
        description:
          type: ["string", "null"]
        url:
          type: string
        private:
          type: boolean
        language:
          type: ["string", "null"]
        updatedAt:
          type: string
      required: [id, name, fullName, url, private, updatedAt]

    GithubConfig:
      type: object
      properties:
        configured:
          type: boolean
        username:
          type: ["string", "null"]
      required: [configured]

    GithubConfigInput:
      type: object
      properties:
        token:
          type: string
      required: [token]

    ImageGenerateInput:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "1792x1024", "1024x1792"]
      required: [prompt]

    ImageGenerateResult:
      type: object
      properties:
        url:
          type: ["string", "null"]
        b64:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required: []
