kind = "web"
previewPath = "/halo-ai/"
title = "Halo AI Assistant"
version = "1.0.0"
id = "artifacts/halo-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/halo-ai/" ]
localPort = 25791

[services.development]
run = "pnpm --filter @workspace/halo-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/halo-ai", "run", "build" ]
publicDir = "artifacts/halo-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25791"
BASE_PATH = "/halo-ai/"
