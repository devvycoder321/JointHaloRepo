version: '3.8'

# JointHaloRepo Docker Compose Configuration
# Orchestrates TWO independent systems:
# 1. MSP Business System (halo-system/) - Main MSP platform
# 2. Standalone AI System (ai_connector/) - AI agent automation

services:
  # ═══════════════════════════════════════════════════════════════
  # MSP BUSINESS SYSTEM - Main Halo IT Services 365 Platform
  # ═══════════════════════════════════════════════════════════════
  
  msp-backend:
    build:
      context: .
      dockerfile: halo-system/Dockerfile
    container_name: haloitservices-backend
    ports:
      - "3000:3000"
    volumes:
      # Mount both backend and frontend for dev hot-reload
      - ./halo-system/backend:/halo-system/backend
      - ./halo-system/frontend:/halo-system/frontend
      - /halo-system/backend/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-sqlite://./dev.db}
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-min-32-chars-required}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-min-32-chars-required}
      - AI_INTEGRATIONS_OPENAI_API_KEY=${AI_INTEGRATIONS_OPENAI_API_KEY:-}
      - CORS_ORIGIN=http://localhost:3000
    restart: unless-stopped
    networks:
      - haloit-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════════
  # STANDALONE AI SYSTEM - Autonomous AI Agent Framework
  # Separate backend for AI automation and management
  # ═══════════════════════════════════════════════════════════════
  
  ai-backend:
    build:
      context: .
      dockerfile: ai_connector/Github-Connector/artifacts/api-server/Dockerfile
    container_name: ai-system-backend
    ports:
      - "8080:8080"
    # NOTE: The AI backend is a separate system from halo-system.
    # It is built inside the container from the ai_connector/Github-Connector artifact
    # path. We must not mount the local workspace over /usr/src/app here because
    # that would hide the built output (including dist/index.mjs) produced by the
    # Dockerfile, causing startup failures.
    environment:
      - PORT=8080
      - NODE_ENV=development
      - DATABASE_URL=${AI_DATABASE_URL:-sqlite://./ai-dev.db}
      - SESSION_SECRET=${AI_SESSION_SECRET:-ai-dev-secret-min-32-chars}
      - AI_INTEGRATIONS_OPENAI_API_KEY=${AI_INTEGRATIONS_OPENAI_API_KEY:-}
    restart: unless-stopped
    networks:
      - haloit-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  haloit-network:
    driver: bridge
