<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halo System - Phase 1 Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid #c33;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid #3c3;
    }

    .demo-credentials {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      font-size: 13px;
    }

    .demo-credentials strong {
      color: #667eea;
    }

    .demo-credentials p {
      margin-bottom: 5px;
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .toggle-form button {
      background: none;
      color: #667eea;
      padding: 0;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
      font-size: 14px;
      width: auto;
    }

    .toggle-form button:hover {
      transform: none;
      box-shadow: none;
      opacity: 0.8;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .password-requirement {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }

    .requirement.met {
      color: #3c3;
    }

    .requirement-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ddd;
    }

    .requirement.met .requirement-dot {
      background: #3c3;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🚀 Halo System</div>
      <div class="subtitle">Phase 1 - Core Platform</div>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <!-- Login Form -->
    <div id="loginForm" class="form-section active">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="admin@halo.local"
            required
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="SecureAdmin123!"
            required
          />
        </div>

        <button type="submit" id="loginButton">Login</button>

        <div class="demo-credentials">
          <strong>Demo Account:</strong>
          <p>Email: <code>admin@halo.local</code></p>
          <p>Password: <code>SecureAdmin123!</code></p>
        </div>
      </form>

      <div class="toggle-form">
        Don't have an account?
        <button type="button" onclick="toggleForm('register')">
          Create one
        </button>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form-section">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="registerName">Display Name</label>
          <input
            type="text"
            id="registerName"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input
            type="email"
            id="registerEmail"
            placeholder="you@halo.local"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input
            type="password"
            id="registerPassword"
            placeholder="Min 12 chars, mixed case, numbers, special chars"
            required
            oninput="checkPasswordStrength()"
          />
          <div class="password-requirement">
            <div class="requirement" id="req-length">
              <span class="requirement-dot"></span> At least 12 characters
            </div>
            <div class="requirement" id="req-upper">
              <span class="requirement-dot"></span> Uppercase letter (A-Z)
            </div>
            <div class="requirement" id="req-lower">
              <span class="requirement-dot"></span> Lowercase letter (a-z)
            </div>
            <div class="requirement" id="req-number">
              <span class="requirement-dot"></span> Number (0-9)
            </div>
            <div class="requirement" id="req-special">
              <span class="requirement-dot"></span> Special character (!@#$%^&*)
            </div>
          </div>
        </div>

        <button type="submit" id="registerButton">Create Account</button>
      </form>

      <div class="toggle-form">
        Already have an account?
        <button type="button" onclick="toggleForm('login')">Login here</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = getApiBaseUrl();

    function getApiBaseUrl() {
      const host = window.location.hostname;
      const proto = window.location.protocol;
      const isCodespaces = /(?:\.app\.github\.dev|\.github\.dev)$/.test(host);

      if (isCodespaces) {
        return `${proto}//${host.replace(
          /-(?:5500|3000)(?=\.app\.github\.dev$|\.github\.dev$)/,
          '-3000'
        )}`;
      }

      if (host === 'localhost' || host === '127.0.0.1') {
        return `${proto}//localhost:3000`;
      }

      return `${proto}//${host}:3000`;
    }

    function toggleForm(form) {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.remove('active');
      document.getElementById(form + 'Form').classList.add('active');
      clearMessages();
    }

    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
    }

    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.style.display = 'block';
    }

    function clearMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearMessages();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Email and password required');
        return;
      }

      const button = document.getElementById('loginButton');
      button.disabled = true;
      button.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Login failed');
          return;
        }

        // Save token
        localStorage.setItem('token', data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));

        showSuccess(
          'Login successful! Redirecting to dashboard in 2 seconds...'
        );

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 2000);
      } catch (error) {
        showError('Network error: ' + error.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Login';
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      clearMessages();

      const displayName = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!displayName || !email || !password) {
        showError('All fields required');
        return;
      }

      if (!validatePasswordStrength(password)) {
        showError(
          'Password does not meet requirements (12 chars, mixed case, numbers, special chars)'
        );
        return;
      }

      const button = document.getElementById('registerButton');
      button.disabled = true;
      button.textContent = 'Creating account...';

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email,
            password,
            display_name: displayName,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Registration failed');
          return;
        }

        showSuccess(
          'Account created successfully! Logging you in in 2 seconds...'
        );

        localStorage.setItem('token', data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 2000);
      } catch (error) {
        showError('Network error: ' + error.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Create Account';
      }
    }

    function validatePasswordStrength(password) {
      return (
        password.length >= 12 &&
        /[A-Z]/.test(password) &&
        /[a-z]/.test(password) &&
        /\d/.test(password) &&
        /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
      );
    }

    function checkPasswordStrength() {
      const password = document.getElementById('registerPassword').value;

      document.getElementById('req-length').classList.toggle(
        'met',
        password.length >= 12
      );
      document.getElementById('req-upper').classList.toggle('met', /[A-Z]/.test(password));
      document.getElementById('req-lower').classList.toggle('met', /[a-z]/.test(password));
      document.getElementById('req-number').classList.toggle('met', /\d/.test(password));
      document.getElementById('req-special').classList.toggle(
        'met',
        /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
      );
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
